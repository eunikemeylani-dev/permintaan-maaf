<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Permintaan Maaf</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f8e1f4, #e0f7fa);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #e91e63;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        .footer {
            margin-top: 20px;
            font-style: italic;
            color: #999;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background-color: #e91e63;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #d81b60;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Maaf 🤍</h1>
        <p>
            Maaf ya karena tanpa sadar beking ngana cemburu. Seharusnya kita lebih peka akan hal itu. 
        </p>
        <p>
            kita paham kenapa ngana marah deng cemburu, sekali lagi minta maaf kedepannya akan di perbaiki
        </p>

        <button onclick="alert('Terima kasih sudah membaca 🤍')">
            Klik di sini
        </button>

        <div class="footer">
            Dengan tulus.
        </div>
    </div>

</body>
</html>
